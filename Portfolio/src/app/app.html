<section>
  <header>
  </header>
  <div class="cuerpo">
    <div class="columna">
      <i class="fa-regular fa-file"></i>
      <i class="fa-solid fa-magnifying-glass"></i>
    </div>
    <div class="sidebar">
      <div class="nav-item about" (click)="redirigir('about')">Sobre_mí.md</div>
      <div class="nav-item skill" (click)="redirigir('skill')">Habilidades.md</div>
      <div class="nav-item proyect" (click)="redirigir('projects')">Proyectos.md</div>
      <div class="nav-item contact" (click)="redirigir('contact')">Contacto.md</div>
    </div>
    <div class="editor">
      <div class="tabs-bar">
        @for (tab of openedTabs; track tab) {
          <div class="tab" [class.active]="tab === activeTab" (click)="redirigir(tab)">
            <span class="tab-name">{{ tab }}.md</span>
            <span class="tab-close" (click)="closeTab(tab, $event)">✕</span>
          </div>
        }
      </div>
      <router-outlet />
    </div>
  </div>
</section>
